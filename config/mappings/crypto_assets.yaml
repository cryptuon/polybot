# Crypto asset aliases and hedging instruments
# Maps common names to standard symbols

aliases:
  # Bitcoin
  bitcoin: BTC
  btc: BTC
  xbt: BTC

  # Ethereum
  ethereum: ETH
  eth: ETH
  ether: ETH

  # Solana
  solana: SOL
  sol: SOL

  # Ripple/XRP
  ripple: XRP
  xrp: XRP

  # Cardano
  cardano: ADA
  ada: ADA

  # Dogecoin
  dogecoin: DOGE
  doge: DOGE

  # Polkadot
  polkadot: DOT
  dot: DOT

  # Avalanche
  avalanche: AVAX
  avax: AVAX

  # Polygon
  polygon: MATIC
  matic: MATIC

  # Chainlink
  chainlink: LINK
  link: LINK

  # Litecoin
  litecoin: LTC
  ltc: LTC

  # Uniswap
  uniswap: UNI
  uni: UNI

  # Aave
  aave: AAVE

  # Arbitrum
  arbitrum: ARB
  arb: ARB

  # Optimism
  optimism: OP
  op: OP

# Default hedge instruments by asset
