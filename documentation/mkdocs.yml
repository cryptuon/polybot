site_name: PolyBot
site_url: https://polybot.docs.cryptuon.com/
site_description: "Open-source automated trading system for prediction markets"
site_author: "Dipankar Sarkar"
repo_url: https://github.com/cryptuon/polybot
repo_name: cryptuon/polybot
edit_uri: edit/main/documentation/docs/

copyright: "Copyright &copy; 2026 Cryptuon"

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cryptuon/polybot
    - icon: fontawesome/brands/discord
      link: https://discord.gg/cryptuon

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
    - First Trade: getting-started/first-trade.md
  - User Guide:
    - user-guide/index.md
    - Strategies:
      - user-guide/strategies/index.md
      - Arbitrage: user-guide/strategies/arbitrage.md
      - Statistical Arbitrage: user-guide/strategies/stat-arb.md
      - AI Model: user-guide/strategies/ai-model.md
      - Spread Farming: user-guide/strategies/spread-farm.md
      - Copy Trading: user-guide/strategies/copy-trade.md
    - Venues:
      - user-guide/venues/index.md
      - Polymarket: user-guide/venues/polymarket.md
      - Kalshi: user-guide/venues/kalshi.md
    - Risk Management: user-guide/risk-management.md
    - Shadow Mode: user-guide/shadow-mode.md
    - Dashboard: user-guide/dashboard.md
    - CLI Reference: user-guide/cli-reference.md
    - AI Agents: user-guide/ai-agents.md
    - Claude Code Skill: user-guide/claude-code-skill.md
  - Developer Guide:
    - developer-guide/index.md
    - Architecture: developer-guide/architecture.md
    - Extending PolyBot:
      - developer-guide/extending/index.md
      - Custom Strategies: developer-guide/extending/custom-strategy.md
      - Custom Venues: developer-guide/extending/custom-venue.md
      - AI Plugins: developer-guide/extending/ai-plugins.md
    - API Reference:
      - developer-guide/api-reference/index.md
    - MCP Server: developer-guide/mcp-server.md
    - Contributing: developer-guide/contributing.md
  - Deployment:
    - deployment/index.md
    - Docker: deployment/docker.md
    - Monitoring: deployment/monitoring.md
    - Security: deployment/security.md
  - Comparison: comparison.md
  - FAQ: faq.md
